@if (loading) {
  <div class="center"><mat-spinner diameter="40" /></div>
} @else if (isCreate) {
  <mat-card>
    <mat-card-title>Nuevo alojamiento</mat-card-title>
    <mat-card-content>
      <form [formGroup]="createForm" (ngSubmit)="saveCreate()">
        <div class="row">
          <mat-form-field appearance="outline">
            <mat-label>tipoAlojID</mat-label>
            <input matInput type="number" formControlName="tipoAlojID" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>adminUsuarioID</mat-label>
            <input matInput type="number" formControlName="adminUsuarioID" />
          </mat-form-field>
        </div>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Descripción</mat-label>
          <textarea matInput rows="2" formControlName="descripcion"></textarea>
        </mat-form-field>
        <div class="row">
          <mat-form-field appearance="outline">
            <mat-label>Dirección</mat-label>
            <input matInput formControlName="direccion" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Ciudad</mat-label>
            <input matInput formControlName="ciudad" />
          </mat-form-field>
        </div>
        <div class="row">
          <mat-form-field appearance="outline">
            <mat-label>Provincia</mat-label>
            <input matInput formControlName="provincia" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>País</mat-label>
            <input matInput formControlName="pais" />
          </mat-form-field>
        </div>
        <button mat-raised-button color="primary" type="submit" [disabled]="createForm.invalid">Crear</button>
        <a mat-button routerLink="/admin/alojamientos">Cancelar</a>
      </form>
    </mat-card-content>
  </mat-card>
} @else {
  <mat-card>
    <mat-card-title>Editar alojamiento #{{ alojamientoId }}</mat-card-title>
    <mat-card-content>
      <form [formGroup]="editForm" (ngSubmit)="saveEdit()">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Descripción</mat-label>
          <textarea matInput rows="2" formControlName="descripcion"></textarea>
        </mat-form-field>
        <div class="row">
          <mat-form-field appearance="outline">
            <mat-label>Dirección</mat-label>
            <input matInput formControlName="direccion" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Ciudad</mat-label>
            <input matInput formControlName="ciudad" />
          </mat-form-field>
        </div>
        <div class="row">
          <mat-form-field appearance="outline">
            <mat-label>Provincia</mat-label>
            <input matInput formControlName="provincia" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>País</mat-label>
            <input matInput formControlName="pais" />
          </mat-form-field>
        </div>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Estado alojamiento</mat-label>
          <input matInput formControlName="estadoAlojamiento" />
        </mat-form-field>
        <button mat-raised-button color="primary" type="submit">Guardar</button>
        <a mat-button routerLink="/admin/alojamientos">Volver</a>
      </form>
    </mat-card-content>
  </mat-card>
}
