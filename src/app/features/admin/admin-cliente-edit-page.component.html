@if (loading) {
  <div class="center"><mat-spinner diameter="40" /></div>
} @else if (isCreate) {
  <mat-card>
    <mat-card-title>Nuevo cliente</mat-card-title>
    <mat-card-content>
      <form [formGroup]="createForm" class="grid-form" (ngSubmit)="saveCreate()">
        <mat-form-field appearance="outline">
          <mat-label>Tipo identificación</mat-label>
          <input matInput formControlName="tipoIdentificacion" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Número identificación</mat-label>
          <input matInput formControlName="numeroIdentificacion" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Nombres</mat-label>
          <input matInput formControlName="nombres" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Apellidos</mat-label>
          <input matInput formControlName="apellidos" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Razón social</mat-label>
          <input matInput formControlName="razonSocial" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Correo</mat-label>
          <input matInput type="email" formControlName="correo" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Teléfono</mat-label>
          <input matInput formControlName="telefono" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Dirección</mat-label>
          <input matInput formControlName="direccion" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Estado</mat-label>
          <input matInput formControlName="estado" />
        </mat-form-field>
        <div class="actions full">
          <button mat-flat-button color="primary" type="submit">Guardar</button>
          <a mat-button routerLink="/admin/clientes">Cancelar</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
} @else {
  <mat-card>
    <mat-card-title>Editar cliente</mat-card-title>
    <mat-card-content>
      <form [formGroup]="editForm" class="grid-form" (ngSubmit)="saveEdit()">
        <mat-form-field appearance="outline">
          <mat-label>Nombres</mat-label>
          <input matInput formControlName="nombres" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Apellidos</mat-label>
          <input matInput formControlName="apellidos" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Razón social</mat-label>
          <input matInput formControlName="razonSocial" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Correo</mat-label>
          <input matInput type="email" formControlName="correo" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Teléfono</mat-label>
          <input matInput formControlName="telefono" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Dirección</mat-label>
          <input matInput formControlName="direccion" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Estado</mat-label>
          <input matInput formControlName="estado" />
        </mat-form-field>
        <div class="actions full">
          <button mat-flat-button color="primary" type="submit">Actualizar</button>
          <a mat-button routerLink="/admin/clientes">Volver</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
}
