<mat-card class="mb">
  <mat-card-title>Habitaciones (admin)</mat-card-title>
  <mat-card-subtitle>Inventario por sucursal: números, tipos y estado operativo.</mat-card-subtitle>
  <mat-card-actions>
    <a mat-raised-button color="primary" routerLink="/admin/habitaciones/nuevo">Nueva</a>
  </mat-card-actions>
</mat-card>

@if (loading) {
  <div class="center"><mat-spinner diameter="40" /></div>
} @else {
  <table mat-table [dataSource]="rows" class="mat-elevation-z1">
    <ng-container matColumnDef="numero">
      <th mat-header-cell *matHeaderCellDef>Número</th>
      <td mat-cell *matCellDef="let r">{{ r.numeroHabitacion }}</td>
    </ng-container>
    <ng-container matColumnDef="sucursal">
      <th mat-header-cell *matHeaderCellDef>Id sucursal</th>
      <td mat-cell *matCellDef="let r">{{ r.idSucursal }}</td>
    </ng-container>
    <ng-container matColumnDef="tipo">
      <th mat-header-cell *matHeaderCellDef>Id tipo</th>
      <td mat-cell *matCellDef="let r">{{ r.idTipoHabitacion }}</td>
    </ng-container>
    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let r">{{ r.estadoHabitacion }}</td>
    </ng-container>
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let r">
        <a mat-button [routerLink]="['/admin/habitaciones', r.habitacionGuid]">Editar</a>
        <button mat-button type="button" (click)="remove(r.habitacionGuid)">Eliminar</button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
  <mat-paginator
    [length]="total"
    [pageIndex]="pageIndex"
    [pageSize]="pageSize"
    [pageSizeOptions]="[5, 10, 20]"
    (page)="onPage($event)"
  />
}
