<mat-card class="mb">
  <mat-card-title>Sucursales</mat-card-title>
  <mat-card-subtitle>Listado interno: sedes enlazadas al marketplace y a inventario de habitaciones.</mat-card-subtitle>
  <mat-card-actions>
    <a mat-raised-button color="primary" routerLink="/admin/sucursales/nuevo">Nueva sucursal</a>
  </mat-card-actions>
</mat-card>

@if (loading) {
  <div class="center"><mat-spinner diameter="40" /></div>
} @else {
  <table mat-table [dataSource]="rows" class="mat-elevation-z1">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>Id</th>
      <td mat-cell *matCellDef="let r">{{ r.idSucursal }}</td>
    </ng-container>
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let r">{{ r.nombreSucursal ?? '—' }}</td>
    </ng-container>
    <ng-container matColumnDef="ciudad">
      <th mat-header-cell *matHeaderCellDef>Ciudad</th>
      <td mat-cell *matCellDef="let r">{{ r.ciudad ?? '—' }}</td>
    </ng-container>
    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let r">{{ r.estadoSucursal ?? '—' }}</td>
    </ng-container>
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let r" class="acciones-cell">
        <a mat-icon-button [routerLink]="['/admin/sucursales', r.sucursalGuid]" matTooltip="Editar">
          <mat-icon>edit</mat-icon>
        </a>
        <a mat-icon-button [routerLink]="['/alojamientos', r.sucursalGuid]" target="_blank" rel="noopener" matTooltip="Ver en marketplace">
          <mat-icon>open_in_new</mat-icon>
        </a>
        <button mat-icon-button color="warn" type="button" matTooltip="Eliminar"
          (click)="remove(r.sucursalGuid, r.nombreSucursal ?? '')">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
  <mat-paginator
    [length]="total"
    [pageIndex]="pageIndex"
    [pageSize]="pageSize"
    [pageSizeOptions]="[5, 10, 20]"
    (page)="onPage($event)"
  />
}
