<header class="site-header">
  <div class="site-header__inner">
    <a routerLink="/" class="site-header__brand" aria-label="Hotel Luxemburgo, inicio">
      <span class="site-header__mark" aria-hidden="true"></span>
      <span class="site-header__wordmark">
        <span class="site-header__name">Hotel Luxemburgo</span>
        <span class="site-header__tagline">Estancias &amp; experiencias</span>
      </span>
    </a>

    <nav class="site-header__nav" aria-label="Principal">
      <a routerLink="/alojamientos" routerLinkActive="is-active">Alojamientos</a>
      @if (auth.isAuthenticated()) {
        <a routerLink="/mis-reservas" routerLinkActive="is-active">Mis reservas</a>
        @if (showAdminPanel()) {
          <a routerLink="/admin" routerLinkActive="is-active">Panel interno</a>
        }
      }
    </nav>

    <div class="site-header__actions">
      @if (auth.isAuthenticated()) {
        <button mat-stroked-button type="button" class="site-header__cta" (click)="auth.logout().subscribe()">
          <mat-icon>logout</mat-icon>
          Cerrar sesión
        </button>
      } @else {
        <a mat-flat-button color="primary" routerLink="/login" class="site-header__cta site-header__cta--primary">
          Entrar
        </a>
      }
    </div>
  </div>
</header>

<main class="site-main">
  <router-outlet />
</main>
